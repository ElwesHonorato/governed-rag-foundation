services:
  ai-backend:
    build:
      context: .
      dockerfile: ./domains/ai_backend/Dockerfile
    ports:
      - "${AI_BACKEND_PORT:-8010}:8010"
    environment:
      AI_BACKEND_HOST: ${AI_BACKEND_HOST:-0.0.0.0}
      AI_BACKEND_PORT: ${AI_BACKEND_PORT:-8010}
      AGENT_PLATFORM_WORKSPACE_ROOT: /workspace
      LLM_URL: ${LLM_URL:?LLM_URL is required}
      LLM_MODEL: ${LLM_MODEL:?LLM_MODEL is required}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:?LLM_TIMEOUT_SECONDS is required}
      WEAVIATE_URL: ${WEAVIATE_URL:?WEAVIATE_URL is required}
      EMBEDDING_DIM: ${EMBEDDING_DIM:?EMBEDDING_DIM is required}
      WEAVIATE_QUERY_DEFAULTS_LIMIT: ${WEAVIATE_QUERY_DEFAULTS_LIMIT:-5}
    volumes:
      - .:/workspace

networks:
  default:
    external: true
    name: ${STACK_NETWORK:?STACK_NETWORK is required}
