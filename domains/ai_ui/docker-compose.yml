services:
  ai-ui:
    build:
      context: ./domains/ai_ui
      dockerfile: Dockerfile
    ports:
      - "${AI_UI_PORT:?AI_UI_PORT is required}:8000"
    environment:
      AI_BACKEND_URL: ${AI_BACKEND_URL:-http://ai-backend:8010}
      AI_BACKEND_TIMEOUT_SECONDS: ${AI_BACKEND_TIMEOUT_SECONDS:-30}

networks:
  default:
    external: true
    name: ${STACK_NETWORK:?STACK_NETWORK is required}
