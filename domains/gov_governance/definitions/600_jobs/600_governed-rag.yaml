flow_id: governed-rag
jobs:
  - id: worker_scan
    domain: rag-platform
    owners: [daedalus]
    custom_properties:
      job.version: "0.0.1"
      job.poll_interval_seconds: "30"
      job.queue.stage: scan
      job.queue.queue_pop_timeout_seconds: "1"
      job.queue.pop_timeout_seconds: "1"
      job.queue.produce: q.parse_document
      job.queue.dlq: q.scan.dlq
      job.storage.bucket: rag-data
      job.storage.source_prefix: 01_incoming/
      job.storage.output_prefix: 02_raw/
      job.storage.manifest_prefix: 07_metadata/manifest/

  - id: worker_parse_document
    domain: rag-platform
    owners: [daedalus]
    custom_properties:
      job.version: "0.0.1"
      job.poll_interval_seconds: "30"
      job.queue.stage: parse_document
      job.queue.queue_pop_timeout_seconds: "1"
      job.queue.pop_timeout_seconds: "1"
      job.queue.consume: q.parse_document
      job.queue.produce: q.chunk_text
      job.queue.dlq: q.parse_document.dlq
      job.storage.bucket: rag-data
      job.storage.output_prefix: 03_processed/
      job.storage.manifest_prefix: 07_metadata/manifest/
      job.security.clearance: internal

  - id: worker_chunk_text
    domain: rag-embeddings
    owners: [daedalus]
    custom_properties:
      job.version: "0.0.1"
      job.poll_interval_seconds: "30"
      job.queue.stage: chunk_text
      job.queue.queue_pop_timeout_seconds: "1"
      job.queue.pop_timeout_seconds: "1"
      job.queue.consume: q.chunk_text
      job.queue.produce: q.embed_chunks
      job.queue.elasticsearch_produce: q.index_elasticsearch
      job.queue.dlq: q.chunk_text.dlq
      job.storage.bucket: rag-data
      job.storage.output_prefix: 04_chunks/
      job.storage.manifest_prefix: 07_metadata/manifest/

  - id: worker_embed_chunks
    domain: rag-embeddings
    owners: [daedalus]
    custom_properties:
      job.version: "0.0.1"
      job.poll_interval_seconds: "30"
      job.queue.stage: embed_chunks
      job.queue.queue_pop_timeout_seconds: "1"
      job.queue.pop_timeout_seconds: "1"
      job.queue.consume: q.embed_chunks
      job.queue.produce: q.index_weaviate
      job.queue.dlq: q.embed_chunks.dlq
      job.storage.bucket: rag-data
      job.storage.output_prefix: 05_embeddings/
      job.storage.manifest_prefix: 07_metadata/manifest/
      job.dimension: "32"

  - id: worker_index_elasticsearch
    domain: rag-indexing
    owners: [daedalus]
    custom_properties:
      job.version: "0.0.1"
      job.poll_interval_seconds: "30"
      job.elasticsearch.index_name: rag_chunks
      job.elasticsearch.request_timeout_seconds: "10"
      job.queue.stage: index_elasticsearch
      job.queue.queue_pop_timeout_seconds: "1"
      job.queue.pop_timeout_seconds: "1"
      job.queue.consume: q.index_elasticsearch
      job.queue.dlq: q.index_elasticsearch.dlq

  - id: worker_index_weaviate
    domain: rag-indexing
    owners: [daedalus]
    custom_properties:
      job.version: "0.0.1"
      job.poll_interval_seconds: "30"
      job.queue.stage: index_weaviate
      job.queue.queue_pop_timeout_seconds: "1"
      job.queue.pop_timeout_seconds: "1"
      job.queue.consume: q.index_weaviate
      job.queue.dlq: q.index_weaviate.dlq
      job.storage.bucket: rag-data
      job.storage.output_prefix: 06_indexes/
      job.storage.manifest_prefix: 07_metadata/manifest/
