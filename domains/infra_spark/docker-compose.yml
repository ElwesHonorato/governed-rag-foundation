services:
  spark-master:
    image: apache/spark:3.5.1
    hostname: spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "${SPARK_MASTER_PORT:-7077}:7077"
      - "${SPARK_MASTER_UI_PORT:-8088}:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/spark-master/7077'"]
      interval: 15s
      timeout: 5s
      retries: 10

  spark-worker:
    image: apache/spark:3.5.1
    hostname: spark-worker
    depends_on:
      - spark-master
    command:
      - /bin/bash
      - -lc
      - /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker --webui-port 8081 --cores ${SPARK_WORKER_CORES:-2} --memory ${SPARK_WORKER_MEMORY:-2G} spark://spark-master:7077
    ports:
      - "${SPARK_WORKER_UI_PORT:-8089}:8081"

networks:
  default:
    external: true
    name: ${STACK_NETWORK:?STACK_NETWORK is required}
