services:
  pipeline-worker-metrics:
    build:
      context: .
      dockerfile: ./domains/worker_metrics/Dockerfile
    environment:
      BROKER_URL: ${BROKER_URL:?BROKER_URL is required}
      S3_ENDPOINT: ${S3_ENDPOINT:?S3_ENDPOINT is required}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
      DATAHUB_GMS_SERVER: ${DATAHUB_GMS_SERVER:-${DATAHUB_GMS_URL:-http://datahub-gms:8080}}
      DATAHUB_ENV: ${DATAHUB_ENV:-${ENV:-DEV}}
      DATAHUB_TOKEN: ${DATAHUB_TOKEN:-}

networks:
  default:
    external: true
    name: ${STACK_NETWORK:?STACK_NETWORK is required}
