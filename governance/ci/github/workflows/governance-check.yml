name: governance-check

on:
  pull_request:
    paths:
      - "governance/**"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml acryl-datahub requests
      - name: Validate definitions
        run: python governance/scripts/validate.py
      - name: Plan (read-only)
        env:
          DATAHUB_TOKEN: ${{ secrets.DATAHUB_TOKEN_DEV }}
        run: python governance/scripts/plan.py --env dev | tee governance-plan.txt
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: governance-plan
          path: governance-plan.txt
