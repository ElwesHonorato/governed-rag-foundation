flow_id: governed-rag
jobs:
  - id: worker_scan
    domain: rag-platform
    owners: [search-platform]
    custom_properties:
      job.version: "0.0.1"
      queue.poll_interval_seconds: "30"
      scan.poll_interval_seconds: "30"
      scan.storage.bucket: rag-data
      scan.storage.incoming_prefix: 01_incoming/
      scan.storage.raw_prefix: 02_raw/
      scan.filters.extensions: .html
      queue.stage: scan
      queue.queue_pop_timeout_seconds: "1"
      queue.pop_timeout_seconds: "1"
      queue.produce: q.parse_document
      queue.dlq: q.scan.dlq

  - id: worker_parse_document
    domain: rag-platform
    owners: [search-platform]
    custom_properties:
      job.version: "0.0.1"
      parse.poll_interval_seconds: "30"
      parse.storage.bucket: rag-data
      parse.storage.raw_prefix: 02_raw/
      parse.storage.processed_prefix: 03_processed/
      parse.security.clearance: internal
      queue.stage: parse_document
      queue.queue_pop_timeout_seconds: "1"
      queue.pop_timeout_seconds: "1"
      queue.consume: q.parse_document
      queue.produce: q.chunk_text
      queue.dlq: q.parse_document.dlq

  - id: worker_chunk_text
    domain: rag-embeddings
    owners: [search-platform]
    custom_properties:
      job.version: "0.0.1"
      chunk.poll_interval_seconds: "30"
      chunk.storage.bucket: rag-data
      chunk.storage.processed_prefix: 03_processed/
      chunk.storage.chunks_prefix: 04_chunks/
      queue.stage: chunk_text
      queue.queue_pop_timeout_seconds: "1"
      queue.pop_timeout_seconds: "1"
      queue.consume: q.chunk_text
      queue.produce: q.embed_chunks
      queue.dlq: q.chunk_text.dlq

  - id: worker_embed_chunks
    domain: rag-embeddings
    owners: [ml-platform]
    custom_properties:
      job.version: "0.0.1"
      embed.poll_interval_seconds: "30"
      embed.storage.bucket: rag-data
      embed.storage.chunks_prefix: 04_chunks/
      embed.storage.embeddings_prefix: 05_embeddings/
      embed.dimension: "32"
      queue.stage: embed_chunks
      queue.queue_pop_timeout_seconds: "1"
      queue.pop_timeout_seconds: "1"
      queue.consume: q.embed_chunks
      queue.produce: q.index_weaviate
      queue.dlq: q.embed_chunks.dlq

  - id: worker_index_weaviate
    domain: rag-indexing
    owners: [search-platform]
    custom_properties:
      job.version: "0.0.1"
      index.poll_interval_seconds: "30"
      index.storage.bucket: rag-data
      index.storage.embeddings_prefix: 05_embeddings/
      index.storage.indexes_prefix: 06_indexes/
      queue.stage: index_weaviate
      queue.queue_pop_timeout_seconds: "1"
      queue.pop_timeout_seconds: "1"
      queue.consume: q.index_weaviate
      queue.dlq: q.index_weaviate.dlq

  - id: worker_manifest
    domain: rag-platform
    owners: [search-platform]
    custom_properties:
      job.version: "0.0.1"
      manifest.poll_interval_seconds: "30"
      manifest.storage.bucket: rag-data
      manifest.storage.processed_prefix: 03_processed/
      manifest.storage.chunks_prefix: 04_chunks/
      manifest.storage.embeddings_prefix: 05_embeddings/
      manifest.storage.indexes_prefix: 06_indexes/
      manifest.storage.manifest_prefix: 07_metadata/manifest/

  - id: worker_metrics
    domain: rag-platform
    owners: [search-platform]
    custom_properties:
      job.version: "0.0.1"
      metrics.poll_interval_seconds: "30"
      metrics.storage.bucket: rag-data
      metrics.storage.processed_prefix: 03_processed/
      metrics.storage.chunks_prefix: 04_chunks/
      metrics.storage.embeddings_prefix: 05_embeddings/
      metrics.storage.indexes_prefix: 06_indexes/
