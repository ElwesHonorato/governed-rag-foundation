flow_id: governed-rag
jobs:
  - id: worker_scan
    domain: rag-platform
    owners: [search-platform]
    custom_properties:
      queue.poll_interval_seconds: "30"
      scan.poll_interval_seconds: "30"
      scan.storage.bucket: rag-data
      scan.storage.incoming_prefix: 01_incoming/
      scan.storage.raw_prefix: 02_raw/
      scan.filters.extensions: .html
      queue.pop_timeout_seconds: "1"
      queue.produce: q.parse_document
      queue.dlq: q.scan.dlq

  - id: worker_parse_document
    domain: rag-platform
    owners: [search-platform]
    custom_properties:
      queue.consume: q.parse_document
      queue.produce: q.chunk_text
      queue.dlq: q.parse_document.dlq

  - id: worker_chunk_text
    domain: rag-embeddings
    owners: [search-platform]
    custom_properties:
      queue.consume: q.chunk_text
      queue.produce: q.embed_chunks
      queue.dlq: q.chunk_text.dlq

  - id: worker_embed_chunks
    domain: rag-embeddings
    owners: [ml-platform]
    custom_properties:
      queue.consume: q.embed_chunks
      queue.produce: q.index_weaviate
      queue.dlq: q.embed_chunks.dlq

  - id: worker_index_weaviate
    domain: rag-indexing
    owners: [search-platform]
    custom_properties:
      queue.consume: q.index_weaviate
      queue.dlq: q.index_weaviate.dlq
